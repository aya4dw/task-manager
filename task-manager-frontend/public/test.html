<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-4xl font-bold text-gray-900 mb-2">
        你好，Andrew! 🦅
      </h1>
      <p class="text-xl text-gray-600 mb-8">
        这是一个纯 HTML 测试页面，不依赖 React
      </p>

      <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">
          配置验证
        </h2>
        <ul class="space-y-3">
          <li class="flex items-center text-green-600">
            ✅ Tailwind CSS 已加载（CDN）
          </li>
          <li class="flex items-center text-green-600">
            ✅ HTML 渲染正常
          </li>
          <li class="flex items-center text-green-600">
            ✅ CSS 样式生效
          </li>
        </ul>
      </div>

      <button onclick="this.textContent='点击次数：' + (++count)" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold">
        点击测试：0
      </button>
      
      <script>
        let count = 0;
      </script>

      <div class="mt-8 p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded">
        <p class="text-yellow-800">
          <strong>说明：</strong> 如果这个页面能正常显示，说明 Tailwind CSS 工作正常。
          React 问题可能是模块导入或缓存问题。
        </p>
      </div>
    </div>
  </body>
</html>
